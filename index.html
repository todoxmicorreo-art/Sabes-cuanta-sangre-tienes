<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculadora de Sangre</title>

  <style>
    body{
      margin:0;
      padding:0;
      font-family: Arial, Helvetica, sans-serif;
      background: #1f7a1f;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .contenedor{
      background:white;
      padding:40px;
      border-radius:20px;
      width:400px;
      text-align:center;
      box-shadow:0 0 20px rgba(0,0,0,0.3);
    }

    h1{
      color:#1f7a1f;
      margin-bottom:30px;
    }

    label{
      font-size:18px;
      font-weight:bold;
    }

    input{
      width:90%;
      padding:12px;
      margin-top:10px;
      margin-bottom:25px;
      border-radius:10px;
      border:1px solid #ccc;
      font-size:16px;
      text-align:center;
    }

    button{
      padding:12px 20px;
      margin:10px;
      border:none;
      border-radius:10px;
      font-size:16px;
      cursor:pointer;
      color:white;
      transition:0.3s;
    }

    .calcular{
      background:#28a745;
    }

    .calcular:hover{
      background:#218838;
    }

    .reiniciar{
      background:#dc3545;
    }

    .reiniciar:hover{
      background:#c82333;
    }

    #resultado{
      margin-top:25px;
      font-size:22px;
      font-weight:bold;
      color:#333;
    }
  </style>
</head>

<body>

  <div class="contenedor">
    <h1>¿Sabes cuánta sangre tienes?</h1>

    <label for="peso">Ingrese su peso en kilogramos:</label><br>

    <input type="number" id="peso" placeholder="Ejemplo: 70">

    <br>

    <button class="calcular" onclick="calcularSangre()">
      Calcular
    </button>

    <button class="reiniciar" onclick="reiniciar()">
      Reiniciar
    </button>

    <div id="resultado"></div>
  </div>

  <script>
    function calcularSangre() {

      let peso = document.getElementById("peso").value;

      if (peso === "" || peso <= 0) {
        alert("Ingrese un peso válido");
        return;
      }

      // Promedio aproximado:
      // 70 ml de sangre por kg
      let sangreLitros = (peso * 70) / 1000;

      document.getElementById("resultado").innerHTML =
        "Tu cuerpo tiene aproximadamente <br>" +
        sangreLitros.toFixed(2) + " litros de sangre";
    }

    function reiniciar() {
      document.getElementById("peso").value = "";
      document.getElementById("resultado").innerHTML = "";
    }
  </script>

</body>
</html>
